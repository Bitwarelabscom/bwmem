services:
  api:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://bwmem:${POSTGRES_PASSWORD:-bwmem}@postgres:5432/bwmem
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      OPENROUTER_CHAT_MODEL: ${OPENROUTER_CHAT_MODEL:-anthropic/claude-3.5-haiku}
      ADMIN_API_KEY: ${ADMIN_API_KEY}
      API_KEY_PEPPER: ${API_KEY_PEPPER}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: bwmem
      POSTGRES_USER: bwmem
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bwmem}
    ports:
      - "127.0.0.1:5432:5432"   # Localhost only (#14)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bwmem"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    ports:
      - "127.0.0.1:6379:6379"   # Localhost only (#14)
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
